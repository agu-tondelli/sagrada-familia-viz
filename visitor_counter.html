<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #07030a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: Georgia, serif;
    overflow: hidden;
    gap: 4px;
  }
  .label-top {
    font-size: 15px;
    color: #f0ddb8;
    text-align: center;
  }
  .counters {
    display: flex;
    gap: 24px;
    align-items: center;
    justify-content: center;
  }
  .counter-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 200px;
  }
  .counter {
    font-size: 48px;
    color: #f0ddb8;
    font-family: Georgia, serif;
    letter-spacing: 2px;
    line-height: 1;
    text-align: center;
    width: 200px;
  }
  .counter-label {
    font-size: 12px;
    color: #f0ddb8;
    font-family: Georgia, serif;
    text-align: center;
    height: 20px;
    line-height: 20px;
  }
  .divider {
    font-size: 36px;
    color: #3a2010;
    font-family: Georgia, serif;
  }
  .note {
    font-size: 9px;
    color: #f0ddb8;
    font-family: Georgia, serif;
    font-style: italic;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="label-top">Since you opened this viz:</div>
  <div class="counters">
    <div class="counter-block">
      <div class="counter" id="visitors">0.00</div>
      <div class="counter-label">visitors</div>
    </div>
    <div class="divider">·</div>
    <div class="counter-block">
      <div class="counter" id="revenue">€0.00</div>
      <div class="counter-label">revenue generated</div>
    </div>
  </div>
  <div class="note">Based on 4.88M visitors · €134.5M revenue in 2025</div>

<script>
  const VISITOR_RATE = 1 / 6.47;
  const REVENUE_RATE = 134500000 / (4880000 * 6.47);
  const start = Date.now();
  function update() {
    const elapsed = (Date.now() - start) / 1000;
    document.getElementById('visitors').textContent = (elapsed * VISITOR_RATE).toFixed(2);
    document.getElementById('revenue').textContent = '€' + (elapsed * REVENUE_RATE).toFixed(2);
    requestAnimationFrame(update);
  }
  update();
</script>
</body>
</html>
