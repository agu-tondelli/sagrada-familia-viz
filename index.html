<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #07030a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: Georgia, serif;
    overflow: hidden;
    gap: 6px;
  }
  .label-top {
    font-size: 15px;
    color: #f0ddb8;
    font-family: Georgia, serif;
    text-align: center;
    font-weight: 400;
  }
  .counter {
    font-size: 48px;
    font-weight: 400;
    color: #f0ddb8;
    font-family: Georgia, serif;
    letter-spacing: 2px;
    line-height: 1;
    text-align: center;
  }
  .label-bot {
    font-size: 12px;
    color: #f0ddb8;
    font-family: Georgia, serif;
    text-align: center;
    line-height: 1.6;
    font-weight: 400;
  }
  .rate {
    font-size: 9px;
    color: #f0ddb8;
    font-family: Georgia, serif;
    font-style: italic;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="label-top">Visitors since you opened this viz</div>
  <div class="counter" id="counter">0</div>
  <div class="label-bot">
    Sagrada Família welcomes<br>
    ~1 visitor every 6.5 seconds
  </div>
  <div class="rate">Based on 4.88M visitors in 2025</div>
<script>
  const RATE = 1 / 6.47;
  const start = Date.now();
  function update() {
    const elapsed = (Date.now() - start) / 1000;
    document.getElementById('counter').textContent = (elapsed * RATE).toFixed(2);
    requestAnimationFrame(update);
  }
  update();
</script>
</body>
</html>
